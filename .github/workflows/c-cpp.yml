name: Build Full Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 编译 原DLL MyDll_original.dll
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          cl /LD MyDll_original.cpp /OUT:MyDll_original.dll kernel32.lib

      - name: 编译 代理DLL MyDll.dll
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          cl /LD MyDll.cpp /link /DEF:MyDll.def /OUT:MyDll.dll kernel32.lib

      - name: 编译 测试程序 Test.exe
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          cl Test.cpp /OUT:Test.exe kernel32.lib

      - name: 打包全部文件
        uses: actions/upload-artifact@v4
        with:
          name: Demo-Binaries
          path: |
            MyDll_original.dll
            MyDll.dll
            Test.exe
