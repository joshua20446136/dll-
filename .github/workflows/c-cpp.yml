name: Build Full Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 编译 MyDll_original.dll
        shell: cmd
        run: |
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          cl /LD MyDll_original.cpp /Fe:MyDll_original.dll kernel32.lib

      - name: 编译 MyDll.dll (代理)
        shell: cmd
        run: |
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          cl /LD MyDll.cpp /link /DEF:MyDll.def /Fe:MyDll.dll kernel32.lib

      - name: 编译 Test.exe
        shell: cmd
        run: |
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          cl Test.cpp /Fe:Test.exe kernel32.lib

      - name: 上传所有文件
        uses: actions/upload-artifact@v4
        with:
          name: Demo-Binaries
          path: |
            MyDll_original.dll
            MyDll.dll
            Test.exe
